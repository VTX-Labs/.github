name: Sync profile README to root

# Keeps the repo's root README.md in sync with profile/README.md so the
# organization profile and this repo's own page show the same content.
# profile/README.md is the single source of truth -- edit only it.

on:
  push:
    branches: [main]
    paths:
      - "profile/README.md"
  workflow_dispatch:

# Avoid overlapping runs racing to commit.
concurrency:
  group: sync-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy profile/README.md to root and commit if changed
        run: |
          cp profile/README.md README.md
          if git diff --quiet -- README.md; then
            echo "Root README already matches profile/README.md; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync root README from profile/README.md [skip ci]"
          git push
