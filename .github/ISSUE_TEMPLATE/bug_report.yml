name: Bug report
description: Report a reproducible problem or unexpected behavior in a VTX Labs project.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us improve. A clear, reproducible report is the
        fastest path to a fix.

        Before you start:
        - Search [existing issues](https://github.com/search?q=org%3AVTX-Labs&type=issues) to avoid duplicates.
        - Make sure you are on the latest version of the project.
        - For a **security vulnerability**, do **not** file a public issue — see our [Security Policy](https://github.com/VTX-Labs/.github/blob/main/SECURITY.md).

  - type: input
    id: project
    attributes:
      label: Which project?
      description: The VTX Labs repository this affects. You may reference any repo in the org (e.g. `VTX-Labs/<repo-name>`).
      placeholder: "VTX-Labs/example-repo"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The package, release, or commit SHA where you saw this.
      placeholder: "1.2.0 or commit abc1234"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one or two sentence description of the bug.
      placeholder: "Calling `parse()` with an empty string throws instead of returning null."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include exact error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Precise, numbered steps. A minimal code snippet or a link to a minimal
        reproduction repository is enormously helpful.
      placeholder: |
        1. Install version X
        2. Run `...` / call `...` with these inputs
        3. Observe the result
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, runtime and version, and anything else relevant.
      value: |
        - OS:
        - Runtime (Node / Bun / Deno / Python) + version:
        - Package manager + version:
        - Browser (if applicable):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & output
      description: Relevant logs, stack traces, or console output. This will be formatted automatically.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, recordings, possible causes, or anything else that helps.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest version, or have noted the version above.
          required: true
        - label: This is not a security vulnerability (those are reported privately).
          required: true
